name: ci

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly backtest smoke, Mondays 06:00 UTC

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync --all-packages --dev
      - run: uv run ruff check packages apps/api data/pipelines
      - run: uv run pytest packages/engine/tests packages/agents/tests apps/api/tests -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  backtest-smoke:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync --all-packages --dev
      - run: uv run pytest packages/engine/tests/test_backtest_smoke.py -q
