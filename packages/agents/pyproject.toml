[project]
name = "rheingold-agents"
version = "0.1.0"
description = "RHEINGOLD agent layer — critics, narrator, compliance gate, citation validator"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40",
    "pydantic>=2.7",
    "rheingold-engine",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rheingold_agents"]

[tool.uv.sources]
rheingold-engine = { workspace = true }
